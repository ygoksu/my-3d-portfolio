services:
  backend:
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/projects"]
      interval: 30s
      timeout: 10s
      retries: 3
    build: ./apps/backend
    ports:
      - "3000:3000"
    environment:
      - APP_PORT=3000
    networks:
      - portfolio-network

  frontend:
    build: ./apps/frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge